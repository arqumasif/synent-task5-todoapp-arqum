<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskDrift — Simple Task Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1E2530;
    --muted: #6B7280;
    --border: #E2E8F0;
    --bg: #F5F3EE;
    --card: #FFFFFF;
    --teal: #0F6E56;
    --teal-light: #E1F5EE;
    --danger: #C0392B;
    --danger-bg: #FDEDEC;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    padding: 50px 20px 80px;
  }

  .app {
    max-width: 520px;
    margin: 0 auto;
  }

  header {
    margin-bottom: 28px;
  }

  header h1 {
    font-family: 'Fraunces', serif;
    font-weight: 900;
    font-size: 30px;
  }

  header p {
    font-size: 14px;
    color: var(--muted);
    margin-top: 4px;
  }

  .add-row {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
  }

  #taskInput {
    flex: 1;
    padding: 14px 16px;
    border-radius: 10px;
    border: 1px solid var(--border);
    font-size: 15px;
    font-family: inherit;
    outline: none;
    background: var(--card);
  }

  #taskInput:focus {
    border-color: var(--teal);
  }

  #addBtn {
    padding: 14px 22px;
    border-radius: 10px;
    border: none;
    background: var(--teal);
    color: #fff;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    transition: transform 0.15s ease, opacity 0.15s ease;
  }

  #addBtn:hover { transform: translateY(-1px); opacity: 0.95; }

  .filter-row {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }

  .filter-btn {
    padding: 7px 16px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--card);
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
  }

  .filter-btn.active {
    background: var(--teal);
    border-color: var(--teal);
    color: #fff;
  }

  .stats-row {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 14px;
    padding: 0 2px;
  }

  #taskList {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .task-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .task-checkbox {
    width: 20px;
    height: 20px;
    border-radius: 6px;
    border: 2px solid var(--border);
    background: transparent;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    color: #fff;
    transition: background 0.15s ease, border-color 0.15s ease;
  }

  .task-checkbox.checked {
    background: var(--teal);
    border-color: var(--teal);
  }

  .task-text {
    flex: 1;
    font-size: 15px;
    word-break: break-word;
  }

  .task-item.completed .task-text {
    text-decoration: line-through;
    color: var(--muted);
  }

  .delete-btn {
    background: var(--danger-bg);
    color: var(--danger);
    border: none;
    border-radius: 8px;
    width: 30px;
    height: 30px;
    font-size: 16px;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.15s ease;
  }

  .delete-btn:hover { transform: scale(1.08); }

  .empty-state {
    text-align: center;
    padding: 50px 20px;
    color: var(--muted);
  }

  .empty-state .big-icon {
    font-size: 36px;
    display: block;
    margin-bottom: 10px;
  }

  footer {
    text-align: center;
    margin-top: 30px;
    font-size: 12.5px;
    color: var(--muted);
  }
</style>
</head>
<body>

<div class="app">
  <header>
    <h1>TaskDrift</h1>
    <p>Your tasks, saved right in this browser</p>
  </header>

  <div class="add-row">
    <input type="text" id="taskInput" placeholder="What needs doing?" maxlength="200" />
    <button id="addBtn">Add</button>
  </div>

  <div class="filter-row">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="active">Active</button>
    <button class="filter-btn" data-filter="completed">Completed</button>
  </div>

  <div class="stats-row">
    <span id="statsText">0 tasks</span>
    <span id="clearCompleted" style="cursor:pointer; text-decoration:underline; display:none;">Clear completed</span>
  </div>

  <ul id="taskList"></ul>

  <div class="empty-state hidden" id="emptyState">
    <span class="big-icon">📝</span>
    No tasks yet — add one above to get started.
  </div>

  <footer>Tasks persist automatically using your browser's localStorage.</footer>
</div>

<script>
  const taskInput = document.getElementById('taskInput');
  const addBtn = document.getElementById('addBtn');
  const taskList = document.getElementById('taskList');
  const emptyState = document.getElementById('emptyState');
  const statsText = document.getElementById('statsText');
  const clearCompletedBtn = document.getElementById('clearCompleted');
  const filterBtns = document.querySelectorAll('.filter-btn');

  const STORAGE_KEY = 'taskdrift-tasks';
  let currentFilter = 'all';

  // ---------- Storage helpers ----------
  function loadTasks() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : [];
    } catch (e) {
      console.error('Failed to load tasks from localStorage:', e);
      return [];
    }
  }

  function saveTasks(tasks) {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
    } catch (e) {
      console.error('Failed to save tasks to localStorage:', e);
    }
  }

  let tasks = loadTasks();

  // ---------- Rendering ----------
  function render() {
    taskList.innerHTML = '';

    const filtered = tasks.filter(t => {
      if (currentFilter === 'active') return !t.completed;
      if (currentFilter === 'completed') return t.completed;
      return true;
    });

    if (filtered.length === 0) {
      emptyState.classList.remove('hidden');
    } else {
      emptyState.classList.add('hidden');
    }

    filtered.forEach(task => {
      const li = document.createElement('li');
      li.className = 'task-item' + (task.completed ? ' completed' : '');

      const checkbox = document.createElement('button');
      checkbox.className = 'task-checkbox' + (task.completed ? ' checked' : '');
      checkbox.textContent = task.completed ? '✓' : '';
      checkbox.addEventListener('click', () => toggleTask(task.id));

      const text = document.createElement('span');
      text.className = 'task-text';
      text.textContent = task.text;

      const deleteBtn = document.createElement('button');
      deleteBtn.className = 'delete-btn';
      deleteBtn.textContent = '✕';
      deleteBtn.addEventListener('click', () => deleteTask(task.id));

      li.appendChild(checkbox);
      li.appendChild(text);
      li.appendChild(deleteBtn);
      taskList.appendChild(li);
    });

    const activeCount = tasks.filter(t => !t.completed).length;
    const completedCount = tasks.filter(t => t.completed).length;
    statsText.textContent = `${activeCount} active, ${completedCount} completed`;
    clearCompletedBtn.style.display = completedCount > 0 ? 'inline' : 'none';
  }

  // ---------- Actions ----------
  function addTask(text) {
    const trimmed = text.trim();
    if (!trimmed) return;

    tasks.push({
      id: Date.now().toString(),
      text: trimmed,
      completed: false
    });

    saveTasks(tasks);
    render();
    taskInput.value = '';
    taskInput.focus();
  }

  function deleteTask(id) {
    tasks = tasks.filter(t => t.id !== id);
    saveTasks(tasks);
    render();
  }

  function toggleTask(id) {
    tasks = tasks.map(t =>
      t.id === id ? { ...t, completed: !t.completed } : t
    );
    saveTasks(tasks);
    render();
  }

  function clearCompleted() {
    tasks = tasks.filter(t => !t.completed);
    saveTasks(tasks);
    render();
  }

  // ---------- Event listeners ----------
  addBtn.addEventListener('click', () => addTask(taskInput.value));
  taskInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') addTask(taskInput.value);
  });

  clearCompletedBtn.addEventListener('click', clearCompleted);

  filterBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      filterBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      render();
    });
  });

  // ---------- Initial render ----------
  render();
</script>

</body>
</html>
