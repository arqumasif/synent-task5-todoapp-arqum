<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskDrift — Simple Task Manager</title>
<link rel="stylesheet" href="style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="app">
  <header>
    <h1>Task Manager</h1>
    <p>Your tasks, saved right in this browser</p>
  </header>

  <div class="add-row">
    <input type="text" id="taskInput" placeholder="What needs doing?" maxlength="200" />
    <button id="addBtn">Add</button>
  </div>

  <div class="filter-row">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="active">Active</button>
    <button class="filter-btn" data-filter="completed">Completed</button>
  </div>

  <div class="stats-row">
    <span id="statsText">0 tasks</span>
    <span id="clearCompleted" style="cursor:pointer; text-decoration:underline; display:none;">Clear completed</span>
  </div>

  <ul id="taskList"></ul>

  <div class="empty-state hidden" id="emptyState">
    <span class="big-icon">📝</span>
    No tasks yet — add one above to get started.
  </div>

  <footer>Tasks persist automatically using your browser's localStorage.</footer>
</div>
<script src="javascript.js"></script>
</body>
</html>
</body>
</html>
